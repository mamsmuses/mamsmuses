<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mam’s Muses</title>

<!-- Google Font: Playfair Display -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

<style>
/* Reset and basic body styling */
body {
    margin: 0;
    background-color: #ffffff; /* White background */
    color: #4b342f; /* Brown from your logo */
    font-family: 'Playfair Display', serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
}

/* Container to center content */
.container {
    max-width: 700px;
    width: 100%;
}

/* Logo styling */
.logo {
    max-width: 100%;     /* Full width on small screens */
    width: 400px;        /* Default larger size on desktop */
    height: auto;        /* Maintain aspect ratio */
    margin-bottom: 40px;
}

/* Text content */
.text-content {
    font-size: 1.2em;
    line-height: 1.8em;
}

.text-content a {
    color: #4b342f; /* Brown links */
    text-decoration: underline;
}

/* Footer styling */
footer {
    margin-top: 50px;
    font-size: 0.85em;
    color: #a39894;
}

/* Responsive adjustments for mobile */
@media (max-width: 500px) {
    .logo {
        width: 90%;       /* Shrink logo on small screens */
        margin-bottom: 30px;
    }
    .text-content {
        font-size: 1.1em; /* Slightly smaller text on mobile */
    }
}
</style>
</head>

<body>

<div class="container">
    <!-- Logo -->
    <img src="logo.png" alt="Mam's Muses Logo" class="logo">

    <!-- Text content -->
    <div class="text-content">
        <p>Welcome — I’m so glad you’re here!</p>
        <p>We create needle minders and more for your needlepoint moments, and give back to dog charities close to our hearts along the way.</p>
        <p>Take a peek at our <a href="https://mamsmuses.etsy.com" target="_blank">Etsy shop</a> and find your next little happy.</p>
        <p>XX mam</p>
    </div>

    <footer>
        © 2026 Mam’s Muses
    </footer>
</div>

</body>
</html>


</body>
</html>
