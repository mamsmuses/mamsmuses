<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mam’s Muses</title>

<!-- Google Font: Playfair Display -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background-color: #ffffff; /* White background */
    color: #4b342f; /* Brown from your logo */
    font-family: 'Playfair Display', serif; /* Elegant font */
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
}

.container {
    max-width: 700px;
}

.logo {
    max-width: 500px; /* Larger logo */
    width: 95%;
    margin-bottom: 40px;
}

.text-content {
    font-size: 1.2em;
    line-height: 1.8em;
}

.text-content a {
    color: #4b342f; /* Brown link to match text */
    text-decoration: underline;
}

footer {
    margin-top: 50px;
    font-size: 0.85em;
    color: #a39894;
}
</style>
</head>

<body>

<div class="container">
    <!-- Logo -->
    <img src="logo.png" alt="Mam's Muses Logo" class="logo">

    <!-- Text content -->
    <div class="text-content">
        <p>Welcome — I’m so glad you’re here!</p>
        <p>We create needle minders and more for your needlepoint moments, and give back to dog charities close to our hearts along the way.</p>
        <p>Take a peek at our <a href="https://mamsmuses.etsy.com" target="_blank">Etsy shop</a> and find your next little happy.</p>
        <p>XX mam</p>
    </div>

    <footer>
        © 2026 Mam’s Muses
    </footer>
</div>

</body>
</html>
